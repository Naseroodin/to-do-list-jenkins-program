<!DOCTYPE html>
<html>
<head>
    <title>To-Do List App</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        input {
            padding: 10px;
            width: 250px;
        }

        button {
            padding: 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        li {
            margin: 10px;
        }
    </style>
</head>
<body>

<h1>My To-Do List</h1>

<input type="text" id="task" placeholder="Enter a task">
<button onclick="addTask()">Add</button>

<ul id="list"></ul>

<script>
function addTask() {
    let task = document.getElementById("task").value;

    if(task != "") {
        let li = document.createElement("li");
        li.innerHTML = task;
        document.getElementById("list").appendChild(li);
        document.getElementById("task").value = "";
    }
}
</script>

</body>
</html>
